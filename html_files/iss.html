<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ISS Command Center | Target Tracking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&family=Orbitron:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://unpkg.com/three@0.148.0/build/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl@2.30.0/dist/globe.gl.min.js"></script>
    <link rel="stylesheet" href="../styles/main.css" />
    <link rel="stylesheet" href="../styles/iss.css" />
  </head>

  <body class="iss-dashboard crt-flicker">
    <button
      type="button"
      id="audio-toggle-btn"
      class="hud-audio-btn"
      aria-pressed="false"
      aria-label="Turn ambient space sound on"
    >
      <i class="fa-solid fa-volume-xmark hud-audio-btn__icon" aria-hidden="true"></i>
      <span class="hud-audio-btn__label">Sound OFF</span>
    </button>

    <nav class="iss-top-nav" aria-label="Mission navigation">
      <div class="iss-top-nav__inner">
        <a href="index.html" class="iss-top-nav__back" aria-label="Back to Mission Control">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
        <h2 class="iss-top-nav__title">MISSION CONTROL</h2>
      </div>
    </nav>

    <main class="iss-main">
      <header class="iss-hero">
        <h1>ISS Live Command Center</h1>
        <p>Tracking the International Space Station in Real Time</p>
      </header>

      <section class="iss-grid">
        <div class="telemetry-col">
          <div class="iss-glass-panel iss-telemetry-panel" id="iss-telemetry-panel">
            <h3 class="iss-panel-title iss-panel-title--with-live">
              <span class="iss-panel-title__label"
                ><i class="fa-solid fa-server"></i> System Telemetry</span
              >
              <span class="iss-live-badge" aria-label="Live telemetry">LIVE</span>
            </h3>

            <div class="live-status" id="iss-connection-status">
              <div class="pulse-dot"></div>
              <span id="status-text">Acquiring signal…</span>
              <span class="mission-active-badge">MISSION ACTIVE</span>
            </div>

            <div class="telemetry-board" style="margin-top: 25px">
              <div class="stat-item telemetry-metric" id="metric-velocity" data-metric="velocity">
                <span class="stat-label">Velocity</span>
                <div class="stat-value">
                  <span id="velocity">…</span> <span class="stat-unit">km/h</span>
                </div>
              </div>
              <div class="stat-item telemetry-metric" id="metric-latitude" data-metric="latitude">
                <span class="stat-label">Latitude</span>
                <div class="stat-value"><span id="latitude">…</span>&deg;</div>
              </div>
              <div class="stat-item telemetry-metric" id="metric-longitude" data-metric="longitude">
                <span class="stat-label">Longitude</span>
                <div class="stat-value"><span id="longitude">…</span>&deg;</div>
              </div>
              <div class="stat-item telemetry-metric" id="metric-altitude" data-metric="altitude">
                <span class="stat-label">Altitude</span>
                <div class="stat-value">
                  <span id="altitude">…</span> <span class="stat-unit">km</span>
                </div>
              </div>
            </div>

            <div id="location-alert" class="alert-hidden">
              <i class="fa-solid fa-triangle-exclamation fa-beat-fade"></i>
              <span>ISS is passing near your location!</span>
            </div>
          </div>
        </div>

        <div class="map-col">
          <div class="iss-glass-panel iss-globe-panel" id="iss-globe-panel" style="padding: 10px; height: 100%">
            <div class="map-wrapper">
              <div id="globe-container"></div>
              <div class="radar-scan-overlay">
                <div class="radar-blade"></div>
              </div>
              <div class="iss-map-hud">
                <i id="scan-icon" class="fa-solid fa-crosshairs fa-spin" aria-hidden="true"></i>
                <span id="radar-ping-text">Scanning orbit…</span>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="iss-grid" style="padding-top: 0">
        <div class="iss-glass-panel iss-crew-panel" id="iss-crew-panel" style="grid-column: 1 / -1">
          <h3 class="iss-panel-title iss-crew-panel__title">
            <span class="iss-crew-panel__title-main">
              <i class="fa-solid fa-users"></i> Crew Onboard (<span id="crew-count">0</span>)
            </span>
            <span class="crew-mission-active-badge">MISSION ACTIVE</span>
          </h3>
          <div class="crew-grid" id="crew-list" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <script src="../scripts/api.js"></script>
    <script src="../scripts/utils.js"></script>
    <script src="../scripts/ui.js"></script>
    <script src="../scripts/iss.js"></script>
  </body>
</html>
